<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>Shadow Mini AI Chat</title>
</head>
<body>
<div class="chat-container">
    <h1>Shadow Mini AI</h1>
    <div id="chat-box" class="chat-box"></div>
    <div class="input-group">
        <input type="text" id="user-msg" placeholder="আপনার প্রশ্ন লিখুন...">
        <button onclick="sendMessage()">Send</button>
    </div>
    <p class="link"><a href="/teach">শিখাতে যেতে এখানে ক্লিক করুন</a></p>
</div>

<script>
async function sendMessage() {
    const msgInput = document.getElementById('user-msg');
    const msg = msgInput.value.trim();
    if(!msg) return;
    appendMessage('আপনি', msg);
    msgInput.value = '';

    const response = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({user_id: 'default', message: msg})
    });
    const data = await response.json();
    typeMessage('AI', data.reply);
}

function appendMessage(sender, text) {
    const chatBox = document.getElementById('chat-box');
    const p = document.createElement('p');
    p.innerHTML = `<b>${sender}:</b> ${text}`;
    chatBox.appendChild(p);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function typeMessage(sender, text) {
    const chatBox = document.getElementById('chat-box');
    const p = document.createElement('p');
    let i = 0;
    p.innerHTML = `<b>${sender}:</b> `;
    chatBox.appendChild(p);

    const interval = setInterval(() => {
        if(i < text.length){
            p.innerHTML += text[i];
            i++;
            chatBox.scrollTop = chatBox.scrollHeight;
        } else {
            clearInterval(interval);
        }
    }, 20); // টাইপিং স্পিড
}
</script>
</body>
</html>
