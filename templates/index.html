<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Mini AI Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f5f5;
        }
        header {
            background: #4a148c;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
        }
        main {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .chat-box {
            display: flex;
            flex-direction: column;
        }
        .message {
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            max-width: 80%;
        }
        .user { background: #6200ea; color: white; align-self: flex-end; }
        .ai { background: #ddd; color: black; align-self: flex-start; }
        footer {
            display: flex;
            padding: 10px;
            background: white;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 15px;
            margin-left: 5px;
            background: #4a148c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>Shadow Mini AI Chat</header>
    <main class="chat-box" id="chatBox"></main>
    <footer>
        <input type="text" id="userInput" placeholder="এখানে লিখুন...">
        <button onclick="sendMessage()">প্রশ্ন করুন</button>
        <button onclick="window.location.href='/teach'">AI শেখাও</button>
    </footer>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: text })
            });
            const data = await response.json();
            addMessage('ai', data.answer);
        }

        function addMessage(sender, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
