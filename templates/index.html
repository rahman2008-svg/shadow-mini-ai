<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>Shadow Mini AI Chat</title>
</head>
<body>
<div class="chat-container">
    <h1>Shadow Mini AI</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-msg" placeholder="আপনার প্রশ্ন লিখুন...">
    <button onclick="sendMessage()">Send</button>
    <a href="/teach" class="teach-link">Teach AI</a>
</div>

<script>
async function sendMessage() {
    const msg = document.getElementById('user-msg').value;
    if(msg.trim() === "") return;
    const response = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({user_id: 'default', message: msg})
    });
    const data = await response.json();
    const chatBox = document.getElementById('chat-box');
    chatBox.innerHTML += `<p><b>আপনি:</b> ${msg}</p>`;
    chatBox.innerHTML += `<p><b>AI:</b> ${data.reply}</p>`;
    document.getElementById('user-msg').value = '';
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
