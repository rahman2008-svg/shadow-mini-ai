<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teach Shadow Mini AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        header {
            background: #4a148c;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
        }
        main {
            padding: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 15px;
            background: #4a148c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>Teach Shadow Mini AI</header>
    <main>
        <label>প্রশ্ন:</label>
        <input type="text" id="question" placeholder="প্রশ্ন লিখুন">
        
        <label>উত্তর:</label>
        <textarea id="answer" rows="4" placeholder="উত্তর লিখুন"></textarea>
        
        <button onclick="teachAI()">শেখাও</button>
        <button onclick="window.location.href='/'">Chat এ ফিরে যাও</button>

        <p id="status"></p>
    </main>

    <script>
        async function teachAI() {
            const question = document.getElementById('question').value.trim();
            const answer = document.getElementById('answer').value.trim();
            if (!question || !answer) return;

            const response = await fetch('/teach_ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, answer })
            });
            const data = await response.json();
            document.getElementById('status').textContent = data.message;
            document.getElementById('question').value = '';
            document.getElementById('answer').value = '';
        }
    </script>
</body>
</html>
