<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/static/style.css">
<title>Teach Shadow Mini AI</title>
</head>
<body>
<div class="teach-container">
    <h1>Teach Shadow Mini AI</h1>
    <input type="text" id="question" placeholder="প্রশ্ন লিখুন">
    <input type="text" id="answer" placeholder="উত্তর লিখুন">
    <button onclick="teachAI()">Teach</button>
    <div id="result"></div>
</div>

<script>
async function teachAI() {
    const q = document.getElementById('question').value;
    const a = document.getElementById('answer').value;
    const response = await fetch('/teach', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({question: q, answer: a, user_id:'admin'})
    });
    const data = await response.json();
    document.getElementById('result').innerText = data.message;
    document.getElementById('question').value = '';
    document.getElementById('answer').value = '';
}
</script>
</body>
</html>
